name: Divergence Ratchet

# Fails any push/PR that grows a Handy-derived file's divergence from the
# upstream merge base, diverges a core file that had none, or leaves a stray
# upstream file outside src-tauri/src/handy/. See Upstream/UPSTREAM.md and
# Upstream/ratchet.py.

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'Upstream/budget.json'
      - 'Upstream/ratchet.py'
  pull_request:
    paths:
      - 'src-tauri/**'
      - 'Upstream/budget.json'
      - 'Upstream/ratchet.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ratchet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for the merge base

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Upstream
        run: |
          git remote add upstream https://github.com/cjpais/handy.git
          git fetch upstream --tags

      - name: Check divergence budgets
        run: python Upstream/ratchet.py
