name: Upstream Sync

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for the trial merge

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Upstream
        run: |
          git remote add upstream https://github.com/cjpais/handy.git
          git fetch upstream --tags

      - name: Trial Merge Report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

          BASE=$(git merge-base HEAD upstream/main || true)
          REPORT="Upstream Tracking/merge-report.md"
          {
            echo "# Upstream Merge Report"
            echo
            echo "_Auto-generated by upstream-sync; do not edit. See docs/UPSTREAM.md._"
            echo
            echo "- Upstream HEAD: \`$(git rev-parse --short upstream/main)\` — $(git log -1 --format='%s (%ci)' upstream/main)"
            echo "- Latest upstream tag: \`$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo none)\`"
          } > "$REPORT"

          if [ -z "$BASE" ]; then
            echo "- **No merge base found — cannot trial-merge.**" >> "$REPORT"
          else
            echo "- Merge base: \`$(git rev-parse --short $BASE)\`" >> "$REPORT"
            echo "- Unmerged upstream commits: $(git rev-list --count HEAD..upstream/main)" >> "$REPORT"
            if git merge --no-commit --no-ff upstream/main > /dev/null 2>&1; then
              echo "- **Trial merge: CLEAN — no conflicts.**" >> "$REPORT"
            else
              CONFLICTS=$(git diff --name-only --diff-filter=U | sort)
              COUNT=$(echo "$CONFLICTS" | grep -c . || true)
              {
                echo "- **Trial merge: $COUNT conflicting file(s):**"
                echo
                echo '```'
                echo "$CONFLICTS"
                echo '```'
              } >> "$REPORT"
            fi
            git merge --abort 2>/dev/null || git reset --hard HEAD
          fi
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Run Sync Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python "Upstream Tracking/sync_upstream.py"

      - name: Commit and Push Changes
        run: |
          git add "Upstream Tracking/data.json" "Upstream Tracking/merge-report.md"
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync upstream commits" && git push)
