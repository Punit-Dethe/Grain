name: Upstream Sync

# Grain's upstream (Handy) intake, end to end — see Upstream/UPSTREAM.md.
#
# Every 2 hours this workflow:
#   1. refreshes Upstream/data.json (the per-commit assessment ledger the
#      Upstream/index.html dashboard renders) plus Upstream/data.js, the
#      offline copy that lets the dashboard open straight off the filesystem;
#   2. trial-merges upstream/main and writes Upstream/merge-report.md (and its
#      machine-readable twin Upstream/status.json, which puts the behind-count
#      and conflict list on the dashboard) so the next sync's conflict surface
#      is always known in advance;
#   3. if upstream has new commits AND the merge is clean, opens (or updates)
#      an automatic sync PR — reviewing that PR is the entire sync workflow
#      for the common case. Conflicted merges are never auto-opened; the
#      report lists the files and the runbook takes over.

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

env:
  SYNC_BRANCH: sync/auto-upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for the trial merge

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Upstream
        run: |
          git remote add upstream https://github.com/cjpais/handy.git
          git fetch upstream --tags

      - name: Configure merge machinery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true
          # Map upstream's files into src-tauri/src/handy/ (the phase-7 layout)
          # aggressively rather than conservatively.
          git config merge.directoryRenames true
          # Reuse every conflict resolution ever recorded by this repo.
          git config rerere.enabled true
          git config rerere.autoupdate true
          python Upstream/rerere_cache.py restore || true

      - name: Trial Merge Report
        id: trial
        run: |
          BASE=$(git merge-base HEAD upstream/main || true)
          REPORT="Upstream/merge-report.md"
          STATUS="Upstream/status.json"
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          CONFLICTS=""
          {
            echo "# Upstream Merge Report"
            echo
            echo "_Auto-generated by upstream-sync; do not edit. See Upstream/UPSTREAM.md._"
            echo
            echo "- Upstream HEAD: \`$(git rev-parse --short upstream/main)\` — $(git log -1 --format='%s (%ci)' upstream/main)"
            echo "- Latest upstream tag: \`$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo none)\`"
          } > "$REPORT"

          CLEAN=false
          if [ -z "$BASE" ]; then
            echo "- **No merge base found — cannot trial-merge.**" >> "$REPORT"
          else
            echo "- Merge base: \`$(git rev-parse --short $BASE)\`" >> "$REPORT"
            echo "- Unmerged upstream commits: $BEHIND" >> "$REPORT"
            if git merge --no-commit --no-ff upstream/main > /dev/null 2>&1; then
              echo "- **Trial merge: CLEAN — no conflicts.**" >> "$REPORT"
              CLEAN=true
            else
              CONFLICTS=$(git diff --name-only --diff-filter=U | sort)
              COUNT=$(echo "$CONFLICTS" | grep -c . || true)
              {
                echo "- **Trial merge: $COUNT conflicting file(s):**"
                echo
                echo '```'
                echo "$CONFLICTS"
                echo '```'
                echo
                echo "Resolve per the divergence map (Upstream/UPSTREAM-DIVERGENCE.md)."
              } >> "$REPORT"
            fi
            git merge --abort 2>/dev/null || git reset --hard HEAD
          fi
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          echo "clean=$CLEAN" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

          # Machine-readable twin of the report: the dashboard renders this so
          # "are we keeping up?" is answerable without reading CI logs.
          UPSTREAM_HEAD="$(git rev-parse --short upstream/main)" \
          UPSTREAM_SUBJECT="$(git log -1 --format='%s' upstream/main)" \
          UPSTREAM_DATE="$(git log -1 --format='%cI' upstream/main)" \
          LATEST_TAG="$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo none)" \
          MERGE_BASE="$(test -n "$BASE" && git rev-parse --short "$BASE" || echo '')" \
          BEHIND="$BEHIND" CLEAN="$CLEAN" CONFLICTS="$CONFLICTS" \
          python - <<'PY' > "$STATUS"
          import json, os
          conflicts = [f for f in os.environ["CONFLICTS"].split("\n") if f.strip()]
          print(json.dumps({
              "upstream_head": os.environ["UPSTREAM_HEAD"],
              "upstream_subject": os.environ["UPSTREAM_SUBJECT"],
              "upstream_date": os.environ["UPSTREAM_DATE"],
              "latest_tag": os.environ["LATEST_TAG"],
              "merge_base": os.environ["MERGE_BASE"],
              "behind": int(os.environ["BEHIND"]),
              "trial_clean": os.environ["CLEAN"] == "true",
              "conflicts": conflicts,
          }, indent=2))
          PY

      # Ledger + ancestry audit. Runs BEFORE the PR step because it detects
      # already-applied commits (cherry-picked work git has no ancestry for) —
      # auto-merging those would replay resolved work and its conflicts.
      - name: Refresh ledger and audit ancestry
        id: ledger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Without pipefail the pipe reports tee's status, so a crashed
          # scraper looked like a successful sync that found nothing.
          set -o pipefail
          python Upstream/sync_upstream.py | tee /tmp/ledger.txt
          if grep -q "ALREADY APPLIED" /tmp/ledger.txt; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            {
              echo
              echo "## Ancestry drift"
              echo '```'
              cat /tmp/ledger.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update the automatic sync PR
        if: >-
          steps.trial.outputs.clean == 'true' &&
          steps.trial.outputs.behind != '0' &&
          steps.ledger.outputs.drift == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git checkout -B "$SYNC_BRANCH" HEAD
          git merge --no-ff upstream/main \
            -m "merge: upstream/main $(git rev-parse --short upstream/main) (auto-sync)"
          # The boundary must hold on the merged result, or there is no PR:
          # better no PR than one that quietly erodes the Handy/Grain split.
          python Upstream/ratchet.py
          git push -f origin "$SYNC_BRANCH"
          git log --oneline main..upstream/main | head -30 > /tmp/commits.txt
          {
            echo "Automatic upstream sync — merged cleanly, divergence ratchet passed."
            echo
            echo '```'
            cat /tmp/commits.txt
            echo '```'
            echo
            echo "Before merging:"
            echo "- [ ] CI green (build, tests, ratchet)"
            echo "- [ ] \`Upstream/data.json\` verdict recorded for each commit"
            echo "- [ ] New settings/bindings? Regenerate \`src/bindings.ts\` on a dev run"
            echo
            echo "Merge with a merge commit — **never squash** (squashing discards the"
            echo "ancestry and the next sync re-fights these commits)."
          } > /tmp/body.md
          if gh pr view "$SYNC_BRANCH" --json state -q .state 2>/dev/null | grep -q OPEN; then
            gh pr edit "$SYNC_BRANCH" --body-file /tmp/body.md
          else
            gh pr create --head "$SYNC_BRANCH" \
              --title "sync: merge upstream/main (auto)" --body-file /tmp/body.md
          fi
          git checkout main

      - name: Commit and Push Changes
        run: |
          git add Upstream/data.json Upstream/data.js Upstream/status.json Upstream/merge-report.md
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync upstream commits" && git push)
