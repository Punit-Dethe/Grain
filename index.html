<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grain</title>
    <!-- [GRAIN] Quick Panel console fonts (Syne display + JetBrains Mono).
         Added Syncopate specifically for the hardware matrix splash sequence. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Syncopate:wght@700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        /* [GRAIN] The main window is opaque + OS-rounded (DWM corner preference
           in lib.rs). The page background fills any client area outside the
           rounded React card; near-black so it reads as an intentional frame. */
        background-color: #0c0b0a;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /* [GRAIN] Static cold-start splash.
         The main settings window is DESTROYED on close to free WebView2 RAM
         ("destroy if not in use"), so every reopen cold-spawns the webview
         (~1s) and then boots Vite + React + i18n + IPC (~3-4s). The window is
         shown immediately, so without this the user stares at a black frame.

         This loader is intentionally pure inline HTML/CSS/JS in index.html: the
         webview paints it the instant it has the document, BEFORE the JS bundle
         is parsed, so it covers the entire gap. React removes #grain-splash
         once the live UI has painted (see src/lib/utils/splash.ts); a 2.5s
         self-destruct timer below is a fallback so it can never block the app. */
      #grain-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #12100e;

        /* Fade the splash out smoothly when React marks it for removal or the
           self-destruct timer hits. */
        opacity: 1;
        transition: opacity 400ms ease-in-out;
      }
      #grain-splash.grain-splash-hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Canvas fills the splash container completely. */
      #splash-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- [GRAIN] Cold-start splash. React removes this node on first mount
         (see src/lib/utils/splash.ts). We also include a fallback auto-fade in
         the JS below so the app is never blocked if React is slow. -->
    <div id="grain-splash" role="presentation" aria-hidden="true">
      <canvas id="splash-canvas"></canvas>
    </div>

    <script>
      (function initSplash() {
        const splashEl = document.getElementById("grain-splash");
        const canvas = document.getElementById("splash-canvas");
        const ctx = canvas.getContext("2d", { alpha: false });

        if (!ctx) return;

        let animationId;
        let width, height;
        let cols = 0;
        let rows = 0;
        const dpr = window.devicePixelRatio || 1;

        // Hardware grid configuration
        const SPACING = 8;
        const RADIUS = 2.5;

        let activeCells = [];
        let bgCanvas = null;
        let startTime = 0;
        let isReady = false;

        const setupCanvas = () => {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width * dpr;
          canvas.height = height * dpr;
          canvas.style.width = `${width}px`;
          canvas.style.height = `${height}px`;

          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);

          cols = Math.ceil(width / SPACING);
          rows = Math.ceil(height / SPACING);

          if (cols > 0 && rows > 0) {
            generateTextMap();
            prerenderBackground();
          }
        };

        const prerenderBackground = () => {
          bgCanvas = document.createElement("canvas");
          bgCanvas.width = width * dpr;
          bgCanvas.height = height * dpr;
          const bgCtx = bgCanvas.getContext("2d", { alpha: false });
          if (!bgCtx) return;
          bgCtx.scale(dpr, dpr);

          bgCtx.fillStyle = "#12100E";
          bgCtx.fillRect(0, 0, width, height);

          bgCtx.fillStyle = "#221D1A";
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const x = c * SPACING + SPACING / 2;
              const y = r * SPACING + SPACING / 2;
              bgCtx.fillRect(x - RADIUS, y - RADIUS, RADIUS * 2, RADIUS * 2);
            }
          }
        };

        const generateTextMap = () => {
          const offCanvas = document.createElement("canvas");
          const offCtx = offCanvas.getContext("2d", {
            willReadFrequently: true,
          });
          if (!offCtx || cols === 0 || rows === 0) return;

          offCanvas.width = cols;
          offCanvas.height = rows;

          // Pure black background
          offCtx.fillStyle = "black";
          offCtx.fillRect(0, 0, cols, rows);

          // Render "GRAIN" in the center using Syncopate
          const fontSize = Math.max(20, Math.min(cols * 0.12, 120));
          offCtx.font = `700 ${fontSize}px 'Syncopate', sans-serif`;
          offCtx.textAlign = "center";
          offCtx.textBaseline = "middle";
          offCtx.fillStyle = "white";

          offCtx.fillText("GRAIN", cols / 2, rows / 2);

          const imgData = offCtx.getImageData(0, 0, cols, rows).data;
          activeCells = [];

          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const i = c + r * cols;
              if (imgData[i * 4] > 128) {
                activeCells.push({
                  x: c * SPACING + SPACING / 2,
                  y: r * SPACING + SPACING / 2,
                  actTime: 0.1 + Math.random() * 0.5
                });
              }
            }
          }
        };

        window.addEventListener("resize", setupCanvas);

        const draw = () => {
          if (!isReady || width <= 0 || height <= 0 || !bgCanvas) {
            animationId = requestAnimationFrame(draw);
            return;
          }

          const elapsed = (Date.now() - startTime) / 1000;

          // Draw the pre-rendered static background grid
          ctx.drawImage(bgCanvas, 0, 0, width, height);

          // Path2D batching for only the active text cells
          const pathDim = new Path2D();
          const pathBright = new Path2D();
          let hasDim = false;
          let hasBright = false;

          for (let i = 0; i < activeCells.length; i++) {
            const cell = activeCells[i];
            if (elapsed > cell.actTime) {
              pathBright.rect(cell.x - RADIUS, cell.y - RADIUS, RADIUS * 2, RADIUS * 2);
              hasBright = true;
            } else if (elapsed > cell.actTime - 0.1) {
              pathDim.rect(cell.x - RADIUS, cell.y - RADIUS, RADIUS * 2, RADIUS * 2);
              hasDim = true;
            }
          }

          if (hasDim) {
            ctx.fillStyle = "#8A3D0B"; // Dim burnt orange (warming up)
            ctx.fill(pathDim);
          }
          if (hasBright) {
            ctx.fillStyle = "#FF6B00"; // Bright glowing orange
            ctx.fill(pathBright);
          }

          animationId = requestAnimationFrame(draw);
        };

        const MIN_SPLASH_TIME = 1500; // Minimum ms to show the splash before fading out

        window.__cleanupSplash = () => {
          cancelAnimationFrame(animationId);
          window.removeEventListener("resize", setupCanvas);
          if (canvas) {
            canvas.width = 0;
            canvas.height = 0;
          }
          if (bgCanvas) {
            bgCanvas.width = 0;
            bgCanvas.height = 0;
            bgCanvas = null;
          }
        };

        window.__requestSplashDismissal = (instant) => {
          if (!splashEl) return;
          if (instant) {
            splashEl.remove();
            window.__cleanupSplash();
            return;
          }

          const elapsed = Date.now() - startTime;
          const remaining = Math.max(0, MIN_SPLASH_TIME - elapsed);

          setTimeout(() => {
            if (!splashEl.classList.contains("grain-splash-hide")) {
              splashEl.classList.add("grain-splash-hide");
              setTimeout(() => {
                splashEl.remove();
                window.__cleanupSplash();
              }, 400);
            }
          }, remaining);
        };

        const begin = () => {
          isReady = true;
          setupCanvas();
          startTime = Date.now();
          draw();

          // Self-destruct safety fallback: if React completely fails to load or dismiss the splash
          setTimeout(() => {
            if (window.__requestSplashDismissal) {
              window.__requestSplashDismissal(false);
            }
          }, 3500); // 3.5s fallback
        };

        // Wait for Syncopate so the GRAIN glyphs sample correctly; fall back to
        // a short timeout if the Font Loading API is unavailable or slow.
        if ("fonts" in document) {
          let started = false;
          const startOnce = () => {
            if (started) return;
            started = true;
            begin();
          };
          document.fonts.ready.then(startOnce);
          // Don't let a stalled font load delay the splash indefinitely.
          setTimeout(startOnce, 300);
        } else {
          begin();
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
