<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grain</title>
    <!-- [GRAIN] Quick Panel console fonts (Syne display + JetBrains Mono). TODO:
         bundle locally for full offline use; loaded from Google Fonts for now. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        /* [GRAIN] The main window is opaque + OS-rounded (DWM corner preference
           in lib.rs). The page background fills any client area outside the
           rounded React card; near-black so it reads as an intentional frame. */
        background-color: #0c0b0a;
      }

      /* [GRAIN] Static cold-start splash.
         ------------------------------------------------------------------
         The main settings window is DESTROYED on close to free WebView2 RAM
         ("destroy if not in use"), so every reopen cold-spawns the webview
         (~1s) and then boots Vite + React + i18n + IPC (~3-4s). The window is
         shown immediately (deferring show() just produced a longer empty void),
         so without this the user stares at a black frame during that boot.

         This loader is intentionally pure inline HTML/CSS in index.html: the
         webview paints it the instant it has the document, BEFORE the JS bundle
         is parsed, so it covers the entire gap. It holds no JS, no React, no
         retained resources — it is plain markup the browser discards the moment
         React removes #grain-splash on first mount (see main.tsx). */
      #grain-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background-color: #0c0b0a;
        /* Fade the splash out smoothly when React marks it for removal. */
        opacity: 1;
        transition: opacity 240ms ease-out;
      }
      #grain-splash.grain-splash-hide {
        opacity: 0;
        pointer-events: none;
      }

      /* [GRAIN] A 7x7 LED dot-matrix "display". Dots light in concentric rings
         rippling out from the center while a slow orange scanline sweeps across
         — a Teenage-Engineering instrument readout idling on the espresso frame.
         Pure CSS: the radial wave is one keyframe; each cell is staggered by its
         ring distance from center (7 buckets cover all 49 cells), and the
         scanline is a single translating gradient bar clipped to the grid. */
      #grain-splash .grain-splash-matrix {
        position: relative;
        display: grid;
        grid-template-columns: repeat(7, 9px);
        grid-template-rows: repeat(7, 9px);
        gap: 8px;
        /* Clip the scanline sweep to the matrix bounds. */
        overflow: hidden;
        padding: 3px;
      }
      #grain-splash .grain-splash-matrix i {
        display: block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        /* Unlit cell: a faint recessed LED. Lit state is driven by the ring
           animation raising opacity + a soft orange glow. */
        background-color: #ff5d1e;
        opacity: 0.08;
        animation: grain-splash-ring 1800ms ease-in-out infinite;
      }

      /* Ring buckets: Chebyshev distance from the 7x7 center cell (ring 0..6).
         Cells sharing a ring share a delay, so the pulse expands as a square
         wave from the middle and the whole matrix breathes as one. */
      #grain-splash .grain-splash-matrix i.r0 { animation-delay: 0ms; }
      #grain-splash .grain-splash-matrix i.r1 { animation-delay: 130ms; }
      #grain-splash .grain-splash-matrix i.r2 { animation-delay: 260ms; }
      #grain-splash .grain-splash-matrix i.r3 { animation-delay: 390ms; }

      /* Sweeping scanline: a narrow vertical highlight bar drifting left→right
         across the matrix, like a sensor pass on an instrument readout. */
      #grain-splash .grain-splash-matrix::after {
        content: "";
        position: absolute;
        top: -10%;
        bottom: -10%;
        width: 26px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 93, 30, 0.5) 50%,
          transparent 100%
        );
        filter: blur(2px);
        mix-blend-mode: screen;
        animation: grain-splash-scan 2600ms ease-in-out infinite;
      }

      #grain-splash .grain-splash-label {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo,
          monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.32);
      }

      /* One ring "lights up": dim recessed LED → bright with a soft orange
         halo → back to dim. The shared keyframe + per-ring delay produces the
         expanding concentric wave. */
      @keyframes grain-splash-ring {
        0%,
        100% {
          opacity: 0.08;
          box-shadow: none;
          transform: scale(0.78);
        }
        40% {
          opacity: 1;
          box-shadow:
            0 0 6px rgba(255, 93, 30, 0.7),
            0 0 12px rgba(255, 93, 30, 0.35);
          transform: scale(1);
        }
      }

      /* Scanline drifts across the matrix width (matrix is ~95px incl. padding). */
      @keyframes grain-splash-scan {
        0% {
          transform: translateX(-30px);
          opacity: 0;
        }
        20%,
        80% {
          opacity: 1;
        }
        100% {
          transform: translateX(95px);
          opacity: 0;
        }
      }

      /* Respect reduced-motion: hold a calm, evenly-lit matrix — no ripple,
         no scanline, no fade. */
      @media (prefers-reduced-motion: reduce) {
        #grain-splash .grain-splash-matrix i {
          animation: none;
          opacity: 0.45;
          transform: none;
        }
        #grain-splash .grain-splash-matrix::after {
          animation: none;
          opacity: 0;
        }
        #grain-splash {
          transition: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- [GRAIN] Cold-start splash. Static markup so it paints before the JS
         bundle loads, covering the webview boot gap. React removes this node
         once the live UI has painted (see src/lib/utils/splash.ts). The 49
         cells carry a ring class (r0..r3 = Chebyshev distance from center) that
         drives the radial wave; the scanline is a pseudo-element. -->
    <div id="grain-splash" role="presentation" aria-hidden="true">
      <div class="grain-splash-matrix">
        <i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i>
        <i class="r3"></i><i class="r2"></i><i class="r2"></i><i class="r2"></i><i class="r2"></i><i class="r2"></i><i class="r3"></i>
        <i class="r3"></i><i class="r2"></i><i class="r1"></i><i class="r1"></i><i class="r1"></i><i class="r2"></i><i class="r3"></i>
        <i class="r3"></i><i class="r2"></i><i class="r1"></i><i class="r0"></i><i class="r1"></i><i class="r2"></i><i class="r3"></i>
        <i class="r3"></i><i class="r2"></i><i class="r1"></i><i class="r1"></i><i class="r1"></i><i class="r2"></i><i class="r3"></i>
        <i class="r3"></i><i class="r2"></i><i class="r2"></i><i class="r2"></i><i class="r2"></i><i class="r2"></i><i class="r3"></i>
        <i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i><i class="r3"></i>
      </div>
      <div class="grain-splash-label">Grain</div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
