<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grain Native Input Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Test button for Scrap That -->
    <button id="sim-scrap" style="position: absolute; top: 12px; right: 12px; background: var(--surface-color); color: var(--text-primary); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: var(--font-family); font-size: 12px;">Simulate "Scrap That"</button>

    <!-- The card toggles an .is-expanded class -->
    <div class="agent-card" id="agent-card">
        
        <!-- Recording State (Compact) -->
        <div class="recording-state" id="recording-state">
            <div class="recording-indicator">
                <!-- Dot Matrix Wave Grid -->
                <div class="agent-wave" id="wave-grid"></div>
            </div>
            <span class="agent-cue-small">Or start typing</span>
        </div>

        <!-- Typing State (Expanded) -->
        <div class="typing-state" id="typing-state">
            <div class="agent-pal-head">
                <span class="agent-brand">GRAIN</span>
                <span class="agent-spacer"></span>
                <span class="agent-sel-chip" id="selection-chip">128 chars</span>
            </div>

            <div class="agent-pal-input">
                <input type="text" id="agent-input" class="agent-pal-field" placeholder="Ask anything..." autocomplete="off">
            </div>

            <div class="agent-pal-foot">
                <div class="agent-foot-left">
                    <span class="agent-esc-text">Tab to record</span>
                </div>
                <div class="agent-foot-right">
                    <span class="agent-esc-text">Esc to close</span>
                    <button class="agent-send-btn" id="send-btn">
                        Confirm ↵
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
