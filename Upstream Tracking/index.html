<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grain Upstream Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #000000;
            --bg-sidebar: rgba(20, 20, 22, 0.85);
            --bg-content: #0a0a0c;
            
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.06);
            --card-hover: rgba(255, 255, 255, 0.08);
            
            --text-primary: #ffffff;
            --text-secondary: #98989d;
            --text-tertiary: #636366;
            
            --accent: #0a84ff;
            
            --status-pending: #ff9f0a;
            --status-merged: #30d158;
            --status-ignored: #64d2ff; /* Changed from red to sky blue */
            
            --blur: blur(40px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
        }

        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .logo .accent {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .search-container {
            padding: 0 16px;
            margin-bottom: 24px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 26px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 8px 12px 8px 36px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
            outline: none;
        }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--card-border);
        }

        .nav-menu {
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-group-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            padding: 8px 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.1s;
        }

        .nav-item:hover {
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }
        .nav-item.active .nav-icon {
            stroke: white;
        }

        .nav-icon {
            color: var(--text-secondary);
        }

        .badge-count {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .nav-item.active .badge-count {
            background: rgba(0, 0, 0, 0.2);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            background: var(--bg-content);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .content-header {
            height: 72px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .content-header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .last-updated {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .scroll-area {
            padding: 40px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* Overview Grid */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .stat-card.pending .stat-value { color: var(--status-pending); }
        .stat-card.merged .stat-value { color: var(--status-merged); }
        .stat-card.ignored .stat-value { color: var(--status-ignored); }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        /* List */
        .commit-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .commit-card {
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px 20px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .commit-card:hover {
            background: var(--card-bg);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .commit-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .status-dot.pending { background: var(--status-pending); box-shadow: 0 0 10px rgba(255, 159, 10, 0.4); }
        .status-dot.merged { background: var(--status-merged); box-shadow: 0 0 10px rgba(48, 209, 88, 0.4); }
        .status-dot.ignored { background: var(--status-ignored); box-shadow: 0 0 10px rgba(100, 210, 255, 0.4); }

        .commit-main {
            flex-grow: 1;
        }

        .commit-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .commit-meta {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .commit-notes {
            margin-top: 8px;
            margin-left: 26px; /* align with text, bypassing dot */
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">Grain <span class="accent">Upstream</span></div>
            </div>
            
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search commits..." class="search-input">
            </div>

            <nav class="nav-menu">
                <div class="nav-group-label">VIEWS</div>
                <button class="nav-item active" data-view="Overview">
                    <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Overview
                </button>
                <button class="nav-item" data-view="Pending">
                    <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff9f0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Pending <span class="badge-count" id="count-pending">0</span>
                </button>
                <button class="nav-item" data-view="Merged">
                    <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#30d158" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Merged <span class="badge-count" id="count-merged">0</span>
                </button>
                <button class="nav-item" data-view="Ignored">
                    <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64d2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                    Ignored <span class="badge-count" id="count-ignored">0</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="content-header">
                <h1 id="viewTitle">Overview</h1>
                <div class="header-actions" id="headerActions">
                    <span class="last-updated" id="lastUpdated">Loading...</span>
                </div>
            </header>

            <div class="scroll-area">
                <!-- Overview Stats (Only visible in Overview) -->
                <div class="overview-grid" id="overviewStats">
                    <div class="stat-card">
                        <div class="stat-label">Total Tracked</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card pending">
                        <div class="stat-label">Action Required</div>
                        <div class="stat-value" id="stat-pending">0</div>
                    </div>
                    <div class="stat-card merged">
                        <div class="stat-label">Successfully Merged</div>
                        <div class="stat-value" id="stat-merged">0</div>
                    </div>
                </div>

                <div class="list-section">
                    <h2 class="section-title" id="listTitle">Recent Commits</h2>
                    <div class="commit-list" id="commitList">
                        <!-- Items injected by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let allData = [];
        let currentView = 'Overview'; // Overview, Pending, Merged, Ignored

        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            
            // Search handler
            document.getElementById('searchInput').addEventListener('input', renderList);
            
            // Navigation handlers
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    const target = e.currentTarget;
                    target.classList.add('active');
                    
                    currentView = target.dataset.view;
                    document.getElementById('viewTitle').innerText = currentView;
                    
                    if (currentView === 'Overview') {
                        document.getElementById('overviewStats').style.display = 'grid';
                        document.getElementById('listTitle').innerText = 'Recent Commits';
                    } else {
                        document.getElementById('overviewStats').style.display = 'none';
                        document.getElementById('listTitle').innerText = `All ${currentView}`;
                    }
                    
                    // Clear search when changing views
                    document.getElementById('searchInput').value = '';
                    renderList();
                });
            });
        });

        async function fetchData() {
            try {
                // Ensure cache is bypassed so we always get latest data
                const response = await fetch('data.json?v=' + new Date().getTime());
                allData = await response.json();
                
                allData.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                updateStats();
                renderList();
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('commitList').innerHTML = `
                    <div class="empty-state">Failed to load tracking data.</div>
                `;
            }
        }

        function updateStats() {
            const pending = allData.filter(d => d.status === 'Pending').length;
            const merged = allData.filter(d => d.status === 'Merged').length;
            const ignored = allData.filter(d => d.status === 'Ignored').length;
            
            document.getElementById('stat-total').innerText = allData.length;
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-merged').innerText = merged;
            
            document.getElementById('count-pending').innerText = pending;
            document.getElementById('count-merged').innerText = merged;
            document.getElementById('count-ignored').innerText = ignored;
            
            if (allData.length > 0) {
                document.getElementById('lastUpdated').innerText = `Last update: ${allData[0].date}`;
            }
        }

        function renderList() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allData.filter(item => {
                const matchesSearch = item.commit.toLowerCase().includes(searchQuery) || 
                                      (item.notes && item.notes.toLowerCase().includes(searchQuery));
                
                let matchesStatus = true;
                if (currentView !== 'Overview') {
                    matchesStatus = item.status === currentView;
                }
                
                return matchesSearch && matchesStatus;
            });
            
            // In Overview, if not searching, limit to 15 recent items
            if (currentView === 'Overview' && searchQuery === '') {
                filtered = filtered.slice(0, 15);
            }
            
            const container = document.getElementById('commitList');
            container.innerHTML = '';
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        No commits found in this view.
                    </div>
                `;
                return;
            }
            
            filtered.forEach(item => {
                const el = document.createElement('div');
                el.className = 'commit-card';
                
                const badgeClass = item.status.toLowerCase();
                
                let notesHtml = '';
                if (item.notes && item.notes.trim() !== 'Pending' && item.notes.trim() !== '') {
                    if (item.notes !== item.status) {
                        notesHtml = `<div class="commit-notes">${item.notes}</div>`;
                    }
                }
                
                let commitText = item.commit;
                if (item.pr) {
                    commitText = commitText.replace(`(#${item.pr})`, `<strong>(#${item.pr})</strong>`);
                }
                
                el.innerHTML = `
                    <div class="commit-header">
                        <div class="status-dot ${badgeClass}"></div>
                        <div class="commit-main">
                            <div class="commit-title">${commitText}</div>
                            <div class="commit-meta">${item.date} • Status: ${item.status}</div>
                        </div>
                    </div>
                    ${notesHtml}
                `;
                
                container.appendChild(el);
            });
        }
    </script>
</body>
</html>
