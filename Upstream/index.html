<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grain — Upstream Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ---- Grain palette: warm dark, wheat accent, muted status hues ---- */
            --bg-app: #0b0a09;
            --bg-sidebar: rgba(17, 16, 14, 0.92);
            --bg-content: #0e0d0b;

            --card-bg: rgba(255, 255, 255, 0.035);
            --card-bg-hover: rgba(255, 255, 255, 0.065);
            --card-border: rgba(255, 255, 255, 0.08);
            --divider: rgba(255, 255, 255, 0.07);

            --text-primary: #f1ede3;
            --text-secondary: #a29c8c;
            --text-tertiary: #6c665a;

            --accent: #d6a44c;
            --accent-strong: #e9bd6c;
            --accent-dim: rgba(214, 164, 76, 0.14);

            --status-pending: #e2704f;
            --status-pending-dim: rgba(226, 112, 79, 0.16);
            --status-merged: #7fb069;
            --status-merged-dim: rgba(127, 176, 105, 0.16);
            --status-ignored: #7c8a97;
            --status-ignored-dim: rgba(124, 138, 151, 0.16);

            --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;

            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: var(--font-ui);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
        }

        button, select, input { font-family: inherit; color: inherit; }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 4px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
        }

        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ============ Sidebar ============ */
        .sidebar {
            width: 264px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header { padding: 22px 20px 4px; }

        .logo {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo .mark {
            width: 18px; height: 18px;
            border-radius: 5px;
            background: linear-gradient(155deg, var(--accent-strong), var(--accent) 60%, #9c7530);
            flex-shrink: 0;
        }
        .logo .accent-text { color: var(--text-secondary); font-weight: 400; }

        .repo-badge {
            margin-top: 8px;
            font-size: 11.5px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
            letter-spacing: 0.2px;
        }

        .search-container {
            padding: 16px 16px 20px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 27px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: 8px 34px 8px 34px;
            color: var(--text-primary);
            font-size: 13px;
            transition: background 0.15s var(--ease), border-color 0.15s var(--ease);
        }
        .search-input:focus { background: rgba(255, 255, 255, 0.1); border-color: var(--card-border); }
        .search-input::placeholder { color: var(--text-tertiary); }

        .search-kbd {
            position: absolute;
            right: 26px;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-mono);
            font-size: 10.5px;
            color: var(--text-tertiary);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            padding: 1px 5px;
            pointer-events: none;
        }
        .search-input:focus ~ .search-kbd,
        .search-input:not(:placeholder-shown) ~ .search-kbd { display: none; }

        .nav-menu {
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-group-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            padding: 6px 12px 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: background 0.12s var(--ease), color 0.12s var(--ease);
        }

        .nav-item:hover { background: var(--card-bg); color: var(--text-primary); }

        .nav-item.active { background: var(--accent-dim); color: var(--accent-strong); }
        .nav-item.active .nav-icon { stroke: var(--accent-strong); }

        .nav-icon { flex-shrink: 0; }

        .badge-count {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.08);
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 11.5px;
            font-weight: 600;
            font-family: var(--font-mono);
        }
        .nav-item.active .badge-count { background: rgba(214, 164, 76, 0.22); color: var(--accent-strong); }

        .sidebar-footer {
            margin-top: auto;
            padding: 14px 20px 18px;
            border-top: 1px solid var(--divider);
        }
        .repo-link {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12.5px;
            color: var(--text-tertiary);
            text-decoration: none;
            transition: color 0.15s var(--ease);
        }
        .repo-link:hover { color: var(--text-secondary); }

        /* ============ Main content ============ */
        .main-content {
            flex-grow: 1;
            background: var(--bg-content);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .content-header {
            min-height: 76px;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .header-title-group h1 {
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .view-subtitle {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .last-updated {
            font-size: 12.5px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
            white-space: nowrap;
        }

        /* Custom sort dropdown (replaces native <select>) */
        .custom-select { position: relative; }
        .custom-select-trigger {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            padding: 7px 10px 7px 12px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s var(--ease), border-color 0.15s var(--ease);
        }
        .custom-select-trigger:hover { background: rgba(255, 255, 255, 0.1); }
        .custom-select-trigger .chevron { color: var(--text-tertiary); transition: transform 0.15s var(--ease); flex-shrink: 0; }
        .custom-select.open .custom-select-trigger { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }
        .custom-select.open .custom-select-trigger .chevron { transform: rotate(180deg); color: var(--accent-strong); }

        .custom-select-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 170px;
            background: #18150f;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin: 0;
            list-style: none;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.5);
            z-index: 30;
        }
        .custom-select-menu[hidden] { display: none; }
        .custom-select-menu li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.1s var(--ease), color 0.1s var(--ease);
        }
        .custom-select-menu li:hover,
        .custom-select-menu li.highlighted { background: rgba(255, 255, 255, 0.07); color: var(--text-primary); }
        .custom-select-menu li.selected { color: var(--accent-strong); }
        .custom-select-menu li .check { display: none; color: var(--accent-strong); flex-shrink: 0; }
        .custom-select-menu li.selected .check { display: inline-flex; }

        .icon-btn {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.03);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: background 0.15s var(--ease), color 0.15s var(--ease);
        }
        .icon-btn:hover { background: var(--card-bg-hover); color: var(--text-primary); }
        .icon-btn.spinning svg { animation: spin 0.6s linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .scroll-area {
            padding: 32px 40px 60px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* ============ Sync panel (signature element) ============ */
        .sync-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 28px 28px 24px;
            margin-bottom: 32px;
        }

        .sync-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sync-total-value {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -1px;
            font-family: var(--font-mono);
        }
        .sync-total-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .sync-callout {
            font-size: 13.5px;
            color: var(--status-pending);
            font-weight: 500;
        }
        .sync-callout.all-clear { color: var(--status-merged); }

        .stream-bar {
            display: flex;
            width: 100%;
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            gap: 2px;
        }
        .stream-segment {
            height: 100%;
            min-width: 4px;
            transition: flex-basis 0.4s var(--ease);
        }
        .stream-segment.pending { background: var(--status-pending); }
        .stream-segment.merged { background: var(--status-merged); }
        .stream-segment.ignored { background: var(--status-ignored); }

        .stream-legend {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 999px;
            padding: 6px 12px 6px 10px;
            font-size: 12.5px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s var(--ease), border-color 0.15s var(--ease);
        }
        .legend-item:hover { background: var(--card-bg-hover); border-color: rgba(255,255,255,0.15); }
        .legend-item strong { font-family: var(--font-mono); color: var(--text-primary); font-weight: 600; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .legend-item.pending .legend-dot { background: var(--status-pending); }
        .legend-item.merged .legend-dot { background: var(--status-merged); }
        .legend-item.ignored .legend-dot { background: var(--status-ignored); }

        .sparkline-block { margin-top: 22px; }
        .sparkline-caption {
            font-size: 11.5px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .sparkline-svg { width: 100%; height: 40px; display: block; overflow: visible; }
        .sparkline-svg rect { transition: opacity 0.15s var(--ease); }
        .sparkline-svg rect:hover { opacity: 0.75; }

        /* ============ List ============ */
        .list-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .section-title {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .result-count {
            font-size: 12.5px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }

        /* ============ Commit table ============ */
        .commit-table-wrap {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.012);
        }

        .commit-table-header {
            display: grid;
            grid-template-columns: 100px minmax(0, 1fr) 96px 64px;
            column-gap: 16px;
            align-items: center;
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--divider);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .commit-table-header span:last-child { text-align: right; }

        .month-row {
            padding: 9px 16px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            background: rgba(255, 255, 255, 0.045);
            border-bottom: 1px solid var(--divider);
        }

        .commit-row {
            display: grid;
            grid-template-columns: 100px minmax(0, 1fr) 96px 64px;
            grid-template-areas: "status title date actions";
            column-gap: 16px;
            align-items: center;
            padding: 13px 16px;
            border-bottom: 1px solid var(--divider);
            transition: background 0.12s var(--ease);
        }
        .commit-row:hover { background: var(--card-bg-hover); }
        .commit-row:hover .copy-btn { opacity: 1; }

        .status-pill {
            grid-area: status;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            white-space: nowrap;
        }
        .status-pill.pending { background: var(--status-pending-dim); color: var(--status-pending); }
        .status-pill.merged { background: var(--status-merged-dim); color: var(--status-merged); }
        .status-pill.ignored { background: var(--status-ignored-dim); color: var(--status-ignored); }
        .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

        .commit-cell { grid-area: title; min-width: 0; }
        .commit-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.45;
            overflow-wrap: anywhere;
        }
        .commit-title mark {
            background: var(--accent-dim);
            color: var(--accent-strong);
            border-radius: 3px;
            padding: 0 1px;
        }
        .pr-link {
            font-family: var(--font-mono);
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .pr-link:hover { text-decoration: underline; }

        .date-cell {
            grid-area: date;
            font-family: var(--font-mono);
            font-size: 12.5px;
            color: var(--text-tertiary);
            text-align: right;
            white-space: nowrap;
            cursor: default;
        }

        .actions-cell {
            grid-area: actions;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .row-icon-btn {
            width: 26px; height: 26px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-tertiary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s var(--ease), color 0.15s var(--ease), opacity 0.15s var(--ease);
        }
        .row-icon-btn:hover { background: rgba(255, 255, 255, 0.09); color: var(--text-primary); }
        .copy-btn { opacity: 0; }
        .copy-btn:focus-visible { opacity: 1; }
        .copy-btn.copied { opacity: 1; color: var(--status-merged); }
        .note-toggle-btn { opacity: 0.55; }
        .note-toggle-btn:hover { opacity: 1; }
        .note-toggle-btn.expanded { opacity: 1; color: var(--accent-strong); background: var(--accent-dim); }

        .note-panel {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.22s var(--ease);
            border-bottom: 1px solid var(--divider);
            background: rgba(255, 255, 255, 0.018);
        }
        .note-panel.expanded { grid-template-rows: 1fr; }
        .note-panel-body {
            overflow: hidden;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
            padding: 0 16px 0 116px;
        }
        .note-panel.expanded .note-panel-body { padding: 2px 16px 14px 116px; }

        /* ============ States: loading / error / empty ============ */
        .skeleton-row {
            height: 54px;
            border-bottom: 1px solid var(--divider);
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.05) 37%, rgba(255,255,255,0.02) 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s ease infinite;
        }
        .skeleton-row:last-child { border-bottom: none; }
        @keyframes shimmer { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }

        .state-panel {
            padding: 52px 24px;
            text-align: center;
            border: 1px dashed var(--card-border);
            border-radius: var(--radius-lg);
        }
        .state-icon { margin-bottom: 14px; color: var(--text-tertiary); }
        .state-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .state-desc { font-size: 13.5px; color: var(--text-tertiary); max-width: 380px; margin: 0 auto; }
        .state-panel.all-clear .state-icon { color: var(--status-merged); }

        .retry-btn {
            margin-top: 18px;
            background: var(--accent-dim);
            color: var(--accent-strong);
            border: 1px solid rgba(214, 164, 76, 0.3);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s var(--ease);
        }
        .retry-btn:hover { background: rgba(214, 164, 76, 0.22); }

        
        /* ============ Toast Notifications ============ */
        #toastContainer {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .toast {
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-icon {
            color: var(--accent-strong);
            flex-shrink: 0;
        }
        .toast-icon.error { color: var(--status-pending); }
        .toast-icon.success { color: var(--status-merged); }

        /* ============ Responsive ============ */
        @media (max-width: 880px) {
            .app-layout { flex-direction: column; }
            .sidebar {
                width: 100%;
                flex-direction: column;
                border-right: none;
                border-bottom: 1px solid var(--card-border);
            }
            .nav-menu { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .nav-group-label { display: none; }
            .badge-count { display: none; }
            .nav-item { flex-shrink: 0; }
            .sidebar-footer { display: none; }
            .content-header { padding: 16px 20px; }
            .scroll-area { padding: 24px 20px 40px; }
        }

        @media (max-width: 640px) {
            .commit-table-header { display: none; }
            .commit-row {
                grid-template-columns: 1fr auto;
                grid-template-areas:
                    "status actions"
                    "title title"
                    "date date";
                row-gap: 8px;
                padding: 14px 16px;
            }
            .date-cell { text-align: left; }
            .note-panel-body { padding-left: 16px; }
            .note-panel.expanded .note-panel-body { padding-left: 16px; }
            
            /* Enhanced Mobile Layout for Controls */
            .sync-panel { padding: 16px 14px; }
            .sync-header { 
                flex-direction: column; 
                align-items: stretch; 
                gap: 16px; 
            }
            .header-actions { 
                width: 100%;
                flex-wrap: wrap;
                justify-content: space-between;
                gap: 10px;
            }
            .search-box {
                width: 100%;
                order: 1; /* Push search bar to its own full width row */
            }
            .search-input { width: 100%; }
            
            .custom-select {
                flex-grow: 1; /* Allow sort dropdown to stretch */
                min-width: 140px;
                order: 2;
            }
            
            /* Action buttons container */
            .header-actions > .icon-btn {
                order: 3;
            }

            /* Toast mobile adjustments */
            #toastContainer {
                bottom: 16px;
                right: 16px;
                left: 16px;
            }
            .toast {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><span class="mark"></span>Grain <span class="accent-text">Upstream</span></div>
                <div class="repo-badge">tracking cjpais/Handy</div>
            </div>

            <div class="search-container">
                <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search commits…" class="search-input" autocomplete="off">
                <kbd class="search-kbd">/</kbd>
            </div>

            <nav class="nav-menu" role="tablist" aria-label="Views">
                <div class="nav-group-label">Views</div>
                <button class="nav-item active" data-view="Overview" role="tab" aria-selected="true">
                    <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Overview
                </button>
                <button class="nav-item" data-view="Pending" role="tab" aria-selected="false">
                    <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e2704f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Pending <span class="badge-count" id="count-pending">0</span>
                </button>
                <button class="nav-item" data-view="Merged" role="tab" aria-selected="false">
                    <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7fb069" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Merged <span class="badge-count" id="count-merged">0</span>
                </button>
                <button class="nav-item" data-view="Ignored" role="tab" aria-selected="false">
                    <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c8a97" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
                    Ignored <span class="badge-count" id="count-ignored">0</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <a class="repo-link" href="https://github.com/cjpais/Handy" target="_blank" rel="noopener">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.725-4.042-1.61-4.042-1.61-.546-1.385-1.333-1.755-1.333-1.755-1.09-.744.083-.729.083-.729 1.205.084 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.42-1.305.762-1.605-2.665-.303-5.467-1.332-5.467-5.93 0-1.31.468-2.38 1.235-3.22-.123-.303-.535-1.523.117-3.176 0 0 1.008-.322 3.3 1.23A11.5 11.5 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.29-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.873.12 3.176.77.84 1.233 1.91 1.233 3.22 0 4.61-2.807 5.624-5.48 5.92.432.372.816 1.103.816 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.216.696.826.577C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
                    View upstream repo
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-title-group">
                    <h1 id="viewTitle">Overview</h1>
                    <p class="view-subtitle" id="viewSubtitle">A snapshot of everything flowing in from upstream Handy.</p>
                </div>
                <div class="header-actions">
                    <span class="last-updated" id="lastUpdated">Loading…</span>
                    <div class="custom-select" id="sortSelect">
                        <button type="button" class="custom-select-trigger" id="sortTrigger" aria-haspopup="listbox" aria-expanded="false">
                            <span id="sortSelectLabel">Newest first</span>
                            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <ul class="custom-select-menu" id="sortMenu" role="listbox" aria-label="Sort commits" tabindex="-1" hidden>
                            <li role="option" data-value="date-desc" aria-selected="true" class="selected">
                                <span class="option-label">Newest first</span>
                                <svg class="check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </li>
                            <li role="option" data-value="date-asc" aria-selected="false">
                                <span class="option-label">Oldest first</span>
                                <svg class="check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </li>
                            <li role="option" data-value="pr" aria-selected="false">
                                <span class="option-label">PR number</span>
                                <svg class="check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </li>
                        </ul>
                    </div>
                    <button class="icon-btn" id="actionBtn" title="Run GitHub Action Sync" aria-label="Run Sync Action">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </button>
                    <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh data">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                </div>
            </header>

            <div class="scroll-area">
                <!-- Signature sync panel -->
                <section class="sync-panel" id="syncPanel">
                    <div class="sync-header">
                        <div>
                            <span class="sync-total-value" id="syncTotalValue">0</span>
                            <span class="sync-total-label">commits tracked from upstream</span>
                        </div>
                        <div class="sync-callout" id="syncCallout">Loading upstream status…</div>
                    </div>
                    <div class="stream-bar" id="streamBar" role="img" aria-label="Breakdown of commit status">
                        <div class="stream-segment pending" id="segPending" style="flex-basis: 0%"></div>
                        <div class="stream-segment merged" id="segMerged" style="flex-basis: 0%"></div>
                        <div class="stream-segment ignored" id="segIgnored" style="flex-basis: 0%"></div>
                    </div>
                    <div class="stream-legend">
                        <button class="legend-item pending" data-view="Pending"><span class="legend-dot"></span>Pending <strong id="legendPendingCount">0</strong></button>
                        <button class="legend-item merged" data-view="Merged"><span class="legend-dot"></span>Merged <strong id="legendMergedCount">0</strong></button>
                        <button class="legend-item ignored" data-view="Ignored"><span class="legend-dot"></span>Ignored <strong id="legendIgnoredCount">0</strong></button>
                    </div>
                    <div class="sparkline-block">
                        <div class="sparkline-caption">Upstream activity — last 12 weeks</div>
                        <svg class="sparkline-svg" id="sparklineSvg" viewBox="0 0 600 40" preserveAspectRatio="none"></svg>
                    </div>
                </section>

                <section class="list-section">
                    <div class="list-section-header">
                        <h2 class="section-title" id="listTitle">Recent Commits</h2>
                        <span class="result-count" id="resultCount"></span>
                    </div>
                    <div id="stateContainer"></div>
                    <div class="commit-list" id="commitList"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        // ---------- Config ----------
        const UPSTREAM_REPO = 'https://github.com/cjpais/Handy'; // used to build PR links

        const VIEW_SUBTITLES = {
            Overview: 'A snapshot of everything flowing in from upstream Handy.',
            Pending: 'Needs review before merging into Grain.',
            Merged: 'Already merged into Grain — nothing to do.',
            Ignored: 'Deliberately not pulled into Grain.'
        };

        const EMPTY_STATES = {
            Pending: { title: "You're caught up", desc: "Nothing waiting on you right now — every upstream commit has been reviewed.", clear: true },
            Merged: { title: 'No merges recorded yet', desc: 'Commits will show up here once they land in Grain.', clear: false },
            Ignored: { title: 'Nothing set aside', desc: "Commits you've deliberately skipped will show up here.", clear: false },
            Overview: { title: 'No commits tracked yet', desc: 'Once data.json has entries, they will appear here.', clear: false }
        };

        // ---------- State ----------
        let allData = [];
        let currentView = 'Overview';
        let currentSort = 'date-desc';
        let hasLoaded = false;
        const expandedNotes = new Set();

        const el = (id) => document.getElementById(id);

        // ---------- Custom sort dropdown ----------
        function initCustomSelect() {
            const wrap = el('sortSelect');
            const trigger = el('sortTrigger');
            const menu = el('sortMenu');
            const label = el('sortSelectLabel');
            const options = Array.from(menu.querySelectorAll('li'));
            let highlightedIndex = options.findIndex(o => o.classList.contains('selected'));

            function updateHighlight() {
                options.forEach((o, i) => o.classList.toggle('highlighted', i === highlightedIndex));
            }
            function openMenu() {
                menu.hidden = false;
                wrap.classList.add('open');
                trigger.setAttribute('aria-expanded', 'true');
                highlightedIndex = options.findIndex(o => o.dataset.value === currentSort);
                updateHighlight();
                menu.focus();
            }
            function closeMenu() {
                menu.hidden = true;
                wrap.classList.remove('open');
                trigger.setAttribute('aria-expanded', 'false');
            }
            function selectOption(opt) {
                options.forEach(o => { o.classList.remove('selected'); o.setAttribute('aria-selected', 'false'); });
                opt.classList.add('selected');
                opt.setAttribute('aria-selected', 'true');
                label.textContent = opt.querySelector('.option-label').textContent;
                currentSort = opt.dataset.value;
                closeMenu();
                trigger.focus();
                renderList();
            }

            trigger.addEventListener('click', () => { menu.hidden ? openMenu() : closeMenu(); });
            trigger.addEventListener('keydown', (e) => {
                if ((e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') && menu.hidden) {
                    e.preventDefault();
                    openMenu();
                }
            });

            options.forEach(opt => opt.addEventListener('click', () => selectOption(opt)));

            menu.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown') { e.preventDefault(); highlightedIndex = Math.min(highlightedIndex + 1, options.length - 1); updateHighlight(); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); highlightedIndex = Math.max(highlightedIndex - 1, 0); updateHighlight(); }
                else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectOption(options[highlightedIndex]); }
                else if (e.key === 'Escape') { closeMenu(); trigger.focus(); }
                else if (e.key === 'Tab') { closeMenu(); }
            });

            document.addEventListener('click', (e) => { if (!wrap.contains(e.target)) closeMenu(); });
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchData();

            el('searchInput').addEventListener('input', renderList);
            el('refreshBtn').addEventListener('click', () => fetchData(true));
            initCustomSelect();
            if (el('actionBtn')) el('actionBtn').addEventListener('click', triggerGitHubAction);

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => switchView(btn.dataset.view));
            });
            document.querySelectorAll('.legend-item').forEach(btn => {
                btn.addEventListener('click', () => switchView(btn.dataset.view));
            });

            el('commitList').addEventListener('click', (e) => {
                const copyBtn = e.target.closest('.copy-btn');
                if (copyBtn) {
                    const text = copyBtn.dataset.copyText || '';
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.classList.add('copied');
                        copyBtn.innerHTML = checkIconSvg();
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            copyBtn.innerHTML = copyIconSvg();
                        }, 1400);
                    }).catch(() => {});
                    return;
                }

                const noteBtn = e.target.closest('.note-toggle-btn');
                if (noteBtn) {
                    const row = noteBtn.closest('.commit-row');
                    const panel = row && row.nextElementSibling;
                    if (panel && panel.classList.contains('note-panel')) {
                        const nowExpanded = panel.classList.toggle('expanded');
                        noteBtn.classList.toggle('expanded', nowExpanded);
                        noteBtn.title = nowExpanded ? 'Hide note' : 'Show note';
                        const key = noteBtn.dataset.key;
                        if (nowExpanded) expandedNotes.add(key); else expandedNotes.delete(key);
                    }
                }
            });

            document.addEventListener('keydown', (e) => {
                const tag = (document.activeElement && document.activeElement.tagName) || '';
                const typing = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';

                if (e.key === '/' && !typing) {
                    e.preventDefault();
                    el('searchInput').focus();
                } else if (e.key === 'Escape' && document.activeElement === el('searchInput')) {
                    el('searchInput').value = '';
                    el('searchInput').blur();
                    renderList();
                } else if (!typing && ['1', '2', '3', '4'].includes(e.key)) {
                    const views = ['Overview', 'Pending', 'Merged', 'Ignored'];
                    switchView(views[parseInt(e.key, 10) - 1]);
                }
            });
        });

        
        function showToast(message, type = 'info') {
            const container = el('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';
            if (type === 'success') {
                icon = checkCircleIconSvg();
            } else if (type === 'error') {
                icon = warningIconSvg();
            }
            
            toast.innerHTML = `<span class="toast-icon ${type}">${icon}</span><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => toast.classList.add('show'));
            
            // Remove after 5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        async function triggerGitHubAction() {
            let token = localStorage.getItem('grain_gh_token');
            if (!token) {
                token = prompt("To trigger GitHub Actions securely from your browser, please enter a GitHub Personal Access Token (PAT) with 'repo' permissions.\n\nThis is stored locally in your browser and never shared.");
                if (!token) return;
                localStorage.setItem('grain_gh_token', token.trim());
            }

            const btn = el('actionBtn');
            if (btn.classList.contains('spinning')) return;
            btn.classList.add('spinning');
            
            showToast('Triggering GitHub Action...', 'info');

            try {
                const response = await fetch('https://api.github.com/repos/Punit-Dethe/Grain/actions/workflows/upstream-sync.yml/dispatches', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ref: 'main' })
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('grain_gh_token');
                    throw new Error('Unauthorized. Your token might be invalid or missing permissions.');
                }
                if (!response.ok) {
                    throw new Error(`Failed to trigger action (${response.status}).`);
                }

                showToast('Sync triggered! Waiting 30 seconds for it to complete...', 'info');
                
                // Wait 30 seconds
                setTimeout(() => {
                    showToast('Sync complete! Refreshing data...', 'success');
                    fetchData(true);
                    btn.classList.remove('spinning');
                }, 30000);
                
            } catch (err) {
                console.error(err);
                showToast(err.message, 'error');
                btn.classList.remove('spinning');
            }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(b => {
                const active = b.dataset.view === view;
                b.classList.toggle('active', active);
                b.setAttribute('aria-selected', String(active));
            });
            el('viewTitle').innerText = view;
            el('viewSubtitle').innerText = VIEW_SUBTITLES[view] || '';
            el('listTitle').innerText = view === 'Overview' ? 'Recent Commits' : `All ${view}`;
            el('searchInput').value = '';
            renderList();
        }

        async function fetchData(isManualRefresh) {
            const refreshBtn = el('refreshBtn');
            if (isManualRefresh) refreshBtn.classList.add('spinning');
            if (!hasLoaded) renderSkeleton();

            try {
                const response = await fetch('data.json?v=' + new Date().getTime());
                if (!response.ok) throw new Error('Bad response');
                allData = await response.json();
                allData.sort((a, b) => new Date(b.date) - new Date(a.date));

                hasLoaded = true;
                el('stateContainer').innerHTML = '';
                updateSyncPanel();
                renderList();
                el('lastUpdated').innerText = allData.length ? `Synced · ${formatAbsolute(allData[0].date)}` : 'Synced';
            } catch (error) {
                console.error('Error fetching data:', error);
                if (!hasLoaded) renderErrorState();
                el('lastUpdated').innerText = 'Sync failed';
            } finally {
                if (isManualRefresh) setTimeout(() => refreshBtn.classList.remove('spinning'), 600);
            }
        }

        function renderSkeleton() {
            const container = el('commitList');
            const wrap = document.createElement('div');
            wrap.className = 'commit-table-wrap';
            for (let i = 0; i < 6; i++) {
                const s = document.createElement('div');
                s.className = 'skeleton-row';
                wrap.appendChild(s);
            }
            container.innerHTML = '';
            container.appendChild(wrap);
        }

        function renderErrorState() {
            el('commitList').innerHTML = '';
            el('stateContainer').innerHTML = `
                <div class="state-panel">
                    <div class="state-icon">${warningIconSvg()}</div>
                    <div class="state-title">Couldn't reach data.json</div>
                    <div class="state-desc">Check that data.json exists alongside this page and is valid JSON.</div>
                    <button class="retry-btn" onclick="fetchData(true)">Retry</button>
                </div>`;
        }

        // ---------- Sync panel ----------
        function updateSyncPanel() {
            const pending = allData.filter(d => d.status === 'Pending').length;
            const merged = allData.filter(d => d.status === 'Merged').length;
            const ignored = allData.filter(d => d.status === 'Ignored').length;
            const total = allData.length;

            el('syncTotalValue').innerText = total;
            el('count-pending').innerText = pending;
            el('count-merged').innerText = merged;
            el('count-ignored').innerText = ignored;
            el('legendPendingCount').innerText = pending;
            el('legendMergedCount').innerText = merged;
            el('legendIgnoredCount').innerText = ignored;

            const pct = (n) => total ? (n / total) * 100 : 0;
            el('segPending').style.flexBasis = pct(pending) + '%';
            el('segMerged').style.flexBasis = pct(merged) + '%';
            el('segIgnored').style.flexBasis = pct(ignored) + '%';

            const callout = el('syncCallout');
            if (total === 0) {
                callout.innerText = 'No commits tracked yet.';
                callout.classList.remove('all-clear');
            } else if (pending === 0) {
                callout.innerText = "You're fully caught up with upstream.";
                callout.classList.add('all-clear');
            } else {
                callout.innerText = `${pending} commit${pending === 1 ? '' : 's'} waiting on review.`;
                callout.classList.remove('all-clear');
            }

            renderSparkline();
        }

        function renderSparkline() {
            const svg = el('sparklineSvg');
            const weeks = 12;
            const now = new Date();
            const buckets = new Array(weeks).fill(0);

            allData.forEach(item => {
                const d = new Date(item.date);
                if (isNaN(d)) return;
                const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
                const weekIndex = weeks - 1 - Math.floor(diffDays / 7);
                if (weekIndex >= 0 && weekIndex < weeks) buckets[weekIndex]++;
            });

            const max = Math.max(...buckets, 1);
            const barWidth = 600 / weeks;
            const gap = 4;
            let bars = '';
            buckets.forEach((count, i) => {
                const h = count === 0 ? 2 : Math.max(3, (count / max) * 36);
                const x = i * barWidth;
                const y = 40 - h;
                const opacity = 0.35 + (i / weeks) * 0.65;
                bars += `<rect x="${x}" y="${y}" width="${barWidth - gap}" height="${h}" rx="2" fill="var(--accent)" opacity="${opacity.toFixed(2)}"><title>${count} commit${count === 1 ? '' : 's'}</title></rect>`;
            });
            svg.innerHTML = bars;
        }

        // ---------- List ----------
        function renderList() {
            const searchQuery = el('searchInput').value.toLowerCase().trim();

            let filtered = allData.filter(item => {
                const matchesSearch = !searchQuery ||
                    item.commit.toLowerCase().includes(searchQuery) ||
                    (item.notes && item.notes.toLowerCase().includes(searchQuery));
                const matchesStatus = currentView === 'Overview' || item.status === currentView;
                return matchesSearch && matchesStatus;
            });

            filtered = sortItems(filtered, currentSort);

            const isLimited = currentView === 'Overview' && !searchQuery;
            if (isLimited) filtered = filtered.slice(0, 15);

            el('resultCount').innerText = filtered.length ? `${filtered.length} shown` : '';

            const container = el('commitList');
            container.innerHTML = '';

            if (!hasLoaded) return;

            if (filtered.length === 0) {
                if (searchQuery) {
                    container.innerHTML = `
                        <div class="state-panel">
                            <div class="state-icon">${searchIconSvg()}</div>
                            <div class="state-title">No matches for "${escapeHtml(el('searchInput').value)}"</div>
                            <div class="state-desc">Try a different term, or clear the search to see everything in this view.</div>
                        </div>`;
                } else {
                    const s = EMPTY_STATES[currentView] || EMPTY_STATES.Overview;
                    container.innerHTML = `
                        <div class="state-panel ${s.clear ? 'all-clear' : ''}">
                            <div class="state-icon">${s.clear ? checkCircleIconSvg() : trayIconSvg()}</div>
                            <div class="state-title">${s.title}</div>
                            <div class="state-desc">${s.desc}</div>
                        </div>`;
                }
                return;
            }

            const wrap = document.createElement('div');
            wrap.className = 'commit-table-wrap';

            const header = document.createElement('div');
            header.className = 'commit-table-header';
            header.innerHTML = '<span>Status</span><span>Commit</span><span>Date</span><span></span>';
            wrap.appendChild(header);

            const grouped = currentView !== 'Overview' && !searchQuery;
            let lastMonth = null;

            filtered.forEach(item => {
                if (grouped) {
                    const monthLabel = formatMonth(item.date);
                    if (monthLabel !== lastMonth) {
                        const monthRow = document.createElement('div');
                        monthRow.className = 'month-row';
                        monthRow.innerText = monthLabel;
                        wrap.appendChild(monthRow);
                  
                        lastMonth = monthLabel;
                    }
                }
                const { row, panel } = buildCommitRow(item, searchQuery);
                wrap.appendChild(row);
                if (panel) wrap.appendChild(panel);
            });
            
            container.appendChild(wrap);
        }

        function sortItems(items, sort) {
            const copy = items.slice();
            if (sort === 'date-asc') copy.sort((a, b) => new Date(a.date) - new Date(b.date));
            else if (sort === 'date-desc') copy.sort((a, b) => new Date(b.date) - new Date(a.date));
            else if (sort === 'pr') copy.sort((a, b) => (parseInt(b.pr) || 0) - (parseInt(a.pr) || 0));
            return copy;
        }

        function buildCommitRow(item, searchQuery) {
            const row = document.createElement('div');
            row.className = 'commit-row';
            
            let commitHtml = escapeHtml(item.commit);
            if (item.pr) {
                const prPattern = new RegExp('\\(#' + item.pr + '\\)');
                const link = `(<a class="pr-link" href="${UPSTREAM_REPO}/pull/${item.pr}" target="_blank" rel="noopener">#${item.pr}</a>)`;
                commitHtml = commitHtml.replace(prPattern, link);
            }
            if (searchQuery) commitHtml = highlightMatch(commitHtml, searchQuery);

            const hasNote = item.notes && item.notes.trim() !== '' && item.notes.trim() !== item.status;
            const noteKey = item.pr || item.commit;
            const isExpanded = expandedNotes.has(noteKey);

            row.innerHTML = `
                <div class="status-pill ${item.status.toLowerCase()}"><span class="pill-dot"></span>${item.status}</div>
                <div class="commit-cell">
                    <div class="commit-title">${commitHtml}</div>
                </div>
                <div class="date-cell">
                    ${formatAbsolute(item.date)}
                </div>
                <div class="actions-cell">
                    ${hasNote ? `<button class="row-icon-btn note-toggle-btn ${isExpanded ? 'expanded' : ''}" data-key="${escapeHtml(noteKey)}" title="${isExpanded ? 'Hide note' : 'Show note'}">${noteIconSvg()}</button>` : ''}
                    <button class="row-icon-btn copy-btn" title="Copy commit title" data-copy-text="${escapeHtml(item.commit)}">${copyIconSvg()}</button>
                </div>
            `;

            let panel = null;
            if (hasNote) {
                panel = document.createElement('div');
                panel.className = `note-panel ${isExpanded ? 'expanded' : ''}`;
                panel.innerHTML = `<div class="note-panel-body">${escapeHtml(item.notes)}</div>`;
            }

            return { row, panel };
        }

        // ---------- Formatting helpers ----------
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function highlightMatch(html, query) {
            if (!query) return html;
            const escaped = query.replace(/[.*+?^$!()|[\]\\]/g, '\\$&');
            const re = new RegExp('(' + escaped + ')', 'ig');
            return html.replace(re, '<mark>$1</mark>');
        }

        function formatAbsolute(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d)) return dateStr;
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatMonth(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d)) return 'Unknown';
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long' });
        }

        function formatRelative(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d)) return dateStr;
            const diffMs = Date.now() - d.getTime();
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays}d ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)}w ago`;
            if (diffDays < 365) return `${Math.floor(diffDays / 30)}mo ago`;
            return `${Math.floor(diffDays / 365)}y ago`;
        }

        // ---------- Icons ----------
        function copyIconSvg() {
            return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
        }
        function checkIconSvg() {
            return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        }
        function statusIconSvg(status) {
            if (status === 'Pending') return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';
            if (status === 'Merged') return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
            return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>';
        }
        function warningIconSvg() {
            return '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
        }
        function trayIconSvg() {
            return '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>';
        }
        function checkCircleIconSvg() {
            return '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
        }
        function searchIconSvg() {
            return '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>';
        }
        function noteIconSvg() {
            return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>';
        }
    </script>

    <div id="toastContainer"></div>
</body>
</html>
