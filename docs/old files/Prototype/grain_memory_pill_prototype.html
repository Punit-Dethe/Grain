<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grain Memory Pill Prototype</title>
    <style>
        :root {
            --bg-color: transparent;
            --surface-color: #f7f3ea; 
            --surface-hover: #ebe5da;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --border-color: #e2dcd0;
            --accent-orange: #ff5500;
            --radius: 16px;
            --shadow: 0 12px 48px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --page-bg-base: #ffffff;
            --page-bg-grad: #e0e0e0;
            --btn-bg: #1a1a1a;
            --btn-text: #ffffff;
            --btn-hover: #333333;
        }

        body.dark-theme {
            --surface-color: #1a1a1a;
            --surface-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #666666;
            --border-color: #333333;
            --shadow: 0 12px 48px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            --page-bg-base: #1a1a1a;
            --page-bg-grad: #050505;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn-hover: #f0f0f0;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--page-bg-base);
            background-image: radial-gradient(circle at center, var(--page-bg-base) 0%, var(--page-bg-grad) 100%);
            font-family: var(--font-family);
            color: var(--text-primary);
            overflow: hidden;
            transition: background-color 0.3s, background-image 0.3s, color 0.3s;
        }

        .agent-card {
            background-color: var(--surface-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            /* Positioned Top Center instead of Bottom */
            position: absolute;
            top: 40px; 
            left: 50%;
            transform: translateX(-50%);

            /* Smooth transition for width/padding ensures symmetric expansion */
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), padding 0.3s cubic-bezier(0.16, 1, 0.3, 1);

            /* Default Compact state */
            width: max-content;
            /* Hugs the inner content perfectly */
            padding: 12px 10px;
            overflow: hidden;
        }

        /* When Expanded */
        .agent-card.is-expanded {
            width: 520px;
            padding: 12px 14px;
        }

        /* --- Recording State --- */
        .recording-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            /* Reduced gap so the text moves left closer to the wave */
            opacity: 1;
            transition: opacity 0.2s;
        }

        .agent-card.is-expanded .recording-state {
            display: none;
        }

        .recording-indicator {
            display: flex;
            align-items: center;
            /* Pushed to the left edge */
            margin-left: 2px;
        }

        /* Dot Matrix Wave Grid */
        .agent-wave {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 3px;
            align-items: center;
            justify-content: center;
        }

        .agent-wave-dot {
            width: 3.5px;
            height: 3.5px;
            border-radius: 50%;
            /* Background color is now injected dynamically via JS for the gradient */
        }

        .agent-cue-small {
            font-size: 11.5px;
            color: #666666;
            letter-spacing: 0.2px;
        }

        /* --- Typing State --- */
        .typing-state {
            display: none;
            flex-direction: column;
            gap: 6px;
            opacity: 0;
        }

        .agent-card.is-expanded .typing-state {
            display: flex;
            opacity: 1;
            animation: fadeIn 0.3s forwards;
        }

        .agent-pal-head {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
        }

        .agent-brand {
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .agent-spacer {
            flex-grow: 1;
        }

        .agent-sel-chip {
            background-color: var(--surface-hover);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid var(--border-color);
        }

        .agent-pal-input {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .agent-pal-title-field {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
            font-family: var(--font-family);
            outline: none;
            padding: 0;
            resize: none;
            overflow-y: auto;
            max-height: 100px;
            line-height: 1.4;
            caret-color: var(--accent-orange);
        }

        .agent-pal-title-field::placeholder {
            color: var(--text-tertiary);
        }

        .agent-pal-body-field {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font-family);
            outline: none;
            padding: 0;
            resize: none;
            min-height: 20px;
            max-height: 350px;
            overflow-y: auto;
            caret-color: var(--accent-orange);
        }

        .agent-pal-body-field::placeholder {
            color: var(--text-tertiary);
        }

        .note-icons {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            margin-right: 12px;
            cursor: pointer;
        }
        
        .note-icons svg:hover {
            color: var(--text-primary);
        }

        .agent-pal-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2px;
        }

        .agent-esc-text {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .agent-foot-right {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }

        .agent-send-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-family);
            transition: background-color 0.2s, transform 0.1s;
        }

        .agent-send-btn:hover {
            background-color: var(--btn-hover);
        }

        .agent-send-btn:active {
            transform: scale(0.96);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) scale(0.95);
            }
        }

        .fade-out {
            animation: fadeOut 0.4s forwards !important;
            pointer-events: none;
        }

        .btn-saved {
            background-color: #10b981 !important;
            color: #ffffff !important;
        }
    </style>
</head>

<body>
    
    <button id="mode-toggle" style="position: absolute; top: 20px; right: 160px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-primary); cursor: pointer; font-family: var(--font-family); z-index: 100; transition: all 0.3s;">Toggle Mode</button>
    <button id="theme-toggle" style="position: absolute; top: 20px; right: 20px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-primary); cursor: pointer; font-family: var(--font-family); z-index: 100; transition: all 0.3s;">Toggle Theme</button>
    <button id="headless-save-btn" style="position: absolute; top: 60px; right: 20px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-primary); cursor: pointer; font-family: var(--font-family); z-index: 100; transition: all 0.3s;">Simulate Headless Save</button>

    <!-- The card toggles an .is-expanded class -->
    <div class="agent-card" id="agent-card">

        <!-- Recording State (Compact) -->
        <div class="recording-state" id="recording-state">
            <div class="recording-indicator">
                <!-- Dot Matrix Wave Grid -->
                <div class="agent-wave" id="wave-grid"></div>
            </div>
            <span class="agent-cue-small" id="compact-cue">Noting...</span>
        </div>

        <!-- Typing State (Expanded) -->
        <div class="typing-state" id="typing-state">
            <div class="agent-pal-head">
                <textarea id="agent-title-input" class="agent-pal-title-field" placeholder="Note Title" rows="1"></textarea>
            </div>

            <div class="agent-pal-input">
                <textarea id="agent-body-input" class="agent-pal-body-field" placeholder="Write down your thoughts..."></textarea>
            </div>

            <div class="agent-pal-foot">
                <div class="agent-foot-left">
                    <span class="agent-esc-text">Tab to record</span>
                </div>
                <div class="agent-foot-right">
                    <div class="note-icons" id="note-icons">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    </div>
                    <span class="agent-esc-text" style="margin-right: 12px; margin-left: 8px;">ESC</span>
                    <button class="agent-send-btn" id="send-btn">
                        Save Note ↵
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const card = document.getElementById('agent-card');
        const titleInput = document.getElementById('agent-title-input');
        const bodyInput = document.getElementById('agent-body-input');
        const sendBtn = document.getElementById('send-btn');
        const waveGrid = document.getElementById('wave-grid');
        const compactCue = document.getElementById('compact-cue');
        const noteIcons = document.getElementById('note-icons');
        
        let isExpanded = false;
        let isFetchMode = false;

        // Initialize Wave Grid
        const WAVE_ROWS = 4;
        const WAVE_COLS = 12;
        const dots = [];

        for (let i = 0; i < WAVE_ROWS * WAVE_COLS; i++) {
            const r = Math.floor(i / WAVE_COLS);
            const c = i % WAVE_COLS;
            const isCorner = (r === 0 || r === WAVE_ROWS - 1) && (c === 0 || c === WAVE_COLS - 1);

            const dot = document.createElement('span');
            dot.className = 'agent-wave-dot';
            if (isCorner) {
                dot.style.visibility = 'hidden';
            }
            waveGrid.appendChild(dot);
            dots.push(dot);
        }

        function updateWaveColors() {
            const isDark = document.body.classList.contains('dark-theme');
            for (let i = 0; i < dots.length; i++) {
                const c = i % WAVE_COLS;
                const ratio = c / (WAVE_COLS - 1);
                let r_val, g_val, b_val;
                
                if (isDark) {
                    r_val = 255;
                    g_val = Math.round(255 - (170 * ratio));
                    b_val = Math.round(255 - (255 * ratio));
                } else {
                    r_val = Math.round(100 + (155 * ratio));
                    g_val = Math.round(100 - (15 * ratio));
                    b_val = Math.round(100 - (100 * ratio));
                }
                
                dots[i].style.backgroundColor = `rgb(${r_val}, ${g_val}, ${b_val})`;
            }
        }
        
        // Initial wave paint
        updateWaveColors();
        
        // Theme Toggle Logic
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            updateWaveColors();
        });

        // Mode Toggle Logic
        document.getElementById('mode-toggle').addEventListener('click', () => {
            isFetchMode = !isFetchMode;
            if (isFetchMode) {
                // Switch to Fetch (Agent) mode
                compactCue.innerText = 'Listening...';
                titleInput.placeholder = 'Ask anything...';
                bodyInput.style.display = 'none';
                noteIcons.style.display = 'none';
                sendBtn.innerHTML = 'Confirm &crarr;';
            } else {
                // Switch to Note mode
                compactCue.innerText = 'Noting...';
                titleInput.placeholder = 'Note Title';
                bodyInput.style.display = 'block';
                noteIcons.style.display = 'flex';
                sendBtn.innerHTML = 'Save Note &crarr;';
            }
        });

        // Start Wave Animation
        let waveAnimId;
        const start = performance.now();
        function tick(now) {
            const time = (now - start) / 1000; // Use seconds for easier math

            for (let i = 0; i < dots.length; i++) {
                const c = i % WAVE_COLS;
                const r = Math.floor(i / WAVE_COLS);
                const isCorner = (r === 0 || r === WAVE_ROWS - 1) && (c === 0 || c === WAVE_COLS - 1);

                if (!isCorner) {
                    const w1 = Math.sin(c * 0.6 + time * 6.0 + r * 0.5);
                    const w2 = Math.sin(c * 0.3 + time * 3.0 - r * 1.2);
                    const w3 = Math.cos(c * 0.8 + time * 4.5 + r * 2.0);
                    const combined = (w1 * 0.5) + (w2 * w1 * 0.5) + (w3 * 0.3);
                    const normalized = (combined + 1.3) / 2.6; 
                    const opacity = 0.05 + (normalized * 0.95);

                    dots[i].style.opacity = Math.max(0.05, Math.min(1.0, opacity));
                }
            }
            waveAnimId = requestAnimationFrame(tick);
        }
        waveAnimId = requestAnimationFrame(tick);

        // Keyboard interactions
        window.addEventListener('keydown', (e) => {
            if (isExpanded) {
                if (e.key === 'Tab') {
                    e.preventDefault(); 
                    isExpanded = false;
                    card.classList.remove('is-expanded');
                    titleInput.value = '';
                    bodyInput.value = '';
                    titleInput.blur();
                    bodyInput.blur();
                } else if (e.key === 'Escape') {
                    console.log("Close agent entirely");
                } else if (e.key === 'Enter') {
                    if (!e.shiftKey) {
                        e.preventDefault();
                        simulateExpandedSave();
                    }
                }
                return;
            }

            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                isExpanded = true;
                card.classList.add('is-expanded');

                setTimeout(() => {
                    if (isFetchMode) {
                        titleInput.focus();
                    } else {
                        bodyInput.focus();
                    }
                }, 50);
            } else if (e.key === 'Escape') {
                console.log("Cancelled recording");
            }
        });

        // Click to expand manually
        card.addEventListener('click', () => {
            if (!isExpanded) {
                isExpanded = true;
                card.classList.add('is-expanded');
                setTimeout(() => {
                    if (isFetchMode) {
                        titleInput.focus();
                    } else {
                        bodyInput.focus();
                    }
                }, 50);
            }
        });

        // Auto-resize inputs
        function autoResize() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        }
        bodyInput.addEventListener('input', autoResize);
        titleInput.addEventListener('input', autoResize);

        // Save Animations
        function simulateExpandedSave() {
            sendBtn.innerHTML = 'Note Saved &check;';
            sendBtn.classList.add('btn-saved');
            titleInput.disabled = true;
            bodyInput.disabled = true;
            
            setTimeout(() => {
                card.classList.add('fade-out');
            }, 1000);
        }

        function simulateHeadlessSave() {
            cancelAnimationFrame(waveAnimId);
            let uncoloredDots = [...dots];
            
            function colorRandomDot() {
                if (uncoloredDots.length === 0) {
                    compactCue.innerText = 'Saved';
                    setTimeout(() => {
                        card.classList.add('fade-out');
                    }, 1000);
                    return;
                }
                
                for (let i=0; i<3; i++) {
                    if (uncoloredDots.length === 0) break;
                    const index = Math.floor(Math.random() * uncoloredDots.length);
                    const dot = uncoloredDots.splice(index, 1)[0];
                    if (dot.style.visibility !== 'hidden') {
                        dot.style.backgroundColor = '#10b981';
                        dot.style.opacity = '1';
                    }
                }
                
                setTimeout(colorRandomDot, 30);
            }
            
            colorRandomDot();
        }

        document.getElementById('headless-save-btn').addEventListener('click', simulateHeadlessSave);

        // Handle Send button click
        sendBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            simulateExpandedSave();
        });

    </script>
</body>

</html>
