<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grain Native Input Prototype</title>
    <style>
        :root {
            --bg-color: transparent;
            --surface-color: #1a1a1a;
            --surface-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #666666;
            --border-color: #333333;
            --accent-orange: #ff5500;
            --radius: 16px;
            --shadow: 0 12px 48px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            font-family: var(--font-family);
            color: var(--text-primary);
            overflow: hidden;
        }

        .agent-card {
            background-color: var(--surface-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            /* Positioned Bottom Center */
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);

            /* Smooth transition for width/padding ensures symmetric expansion */
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), padding 0.3s cubic-bezier(0.16, 1, 0.3, 1);

            /* Default Compact state */
            width: max-content;
            /* Hugs the inner content perfectly */
            padding: 12px 10px;
            overflow: hidden;
        }

        /* When Expanded */
        .agent-card.is-expanded {
            width: 520px;
            padding: 16px 10px;
        }

        /* --- Recording State --- */
        .recording-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            /* Reduced gap so the text moves left closer to the wave */
            opacity: 1;
            transition: opacity 0.2s;
        }

        .agent-card.is-expanded .recording-state {
            display: none;
        }

        .recording-indicator {
            display: flex;
            align-items: center;
            /* Pushed to the left edge */
            margin-left: 2px;
        }

        /* Dot Matrix Wave Grid */
        .agent-wave {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 3px;
            align-items: center;
            justify-content: center;
        }

        .agent-wave-dot {
            width: 3.5px;
            height: 3.5px;
            border-radius: 50%;
            /* Background color is now injected dynamically via JS for the gradient */
        }

        .agent-cue-small {
            font-size: 11.5px;
            color: #8a8a8a;
            /* Slightly brighter than tertiary */
            letter-spacing: 0.2px;
        }

        /* --- Typing State --- */
        .typing-state {
            display: none;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
        }

        .agent-card.is-expanded .typing-state {
            display: flex;
            opacity: 1;
            animation: fadeIn 0.3s forwards;
        }

        .agent-pal-head {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
        }

        .agent-brand {
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .agent-spacer {
            flex-grow: 1;
        }

        .agent-sel-chip {
            background-color: var(--surface-hover);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid var(--border-color);
        }

        .agent-pal-input {
            position: relative;
        }

        .agent-pal-field {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            font-family: var(--font-family);
            outline: none;
            padding: 0;
            caret-color: var(--accent-orange);
        }

        .agent-pal-field::placeholder {
            color: var(--text-tertiary);
        }

        .agent-pal-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .agent-esc-text {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .agent-foot-right {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }

        .agent-send-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-family);
            transition: background-color 0.2s, transform 0.1s;
        }

        .agent-send-btn:hover {
            background-color: #f0f0f0;
        }

        .agent-send-btn:active {
            transform: scale(0.96);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>



    <!-- The card toggles an .is-expanded class -->
    <div class="agent-card" id="agent-card">

        <!-- Recording State (Compact) -->
        <div class="recording-state" id="recording-state">
            <div class="recording-indicator">
                <!-- Dot Matrix Wave Grid -->
                <div class="agent-wave" id="wave-grid"></div>
            </div>
            <span class="agent-cue-small">Listening...</span>
        </div>

        <!-- Typing State (Expanded) -->
        <div class="typing-state" id="typing-state">
            <div class="agent-pal-head">
                <span class="agent-brand">GRAIN</span>
                <span class="agent-spacer"></span>
                <span class="agent-sel-chip" id="selection-chip">128 chars</span>
            </div>

            <div class="agent-pal-input">
                <input type="text" id="agent-input" class="agent-pal-field" placeholder="Ask anything..."
                    autocomplete="off">
            </div>

            <div class="agent-pal-foot">
                <div class="agent-foot-left">
                    <span class="agent-esc-text">Tab to record</span>
                </div>
                <div class="agent-foot-right">
                    <span class="agent-esc-text">Esc to close</span>
                    <button class="agent-send-btn" id="send-btn">
                        Confirm ↵
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const card = document.getElementById('agent-card');
        const input = document.getElementById('agent-input');
        const sendBtn = document.getElementById('send-btn');
        const waveGrid = document.getElementById('wave-grid');

        let isExpanded = false;

        // Initialize Wave Grid
        const WAVE_ROWS = 4;
        const WAVE_COLS = 12;
        const dots = [];

        for (let i = 0; i < WAVE_ROWS * WAVE_COLS; i++) {
            const r = Math.floor(i / WAVE_COLS);
            const c = i % WAVE_COLS;
            const isCorner = (r === 0 || r === WAVE_ROWS - 1) && (c === 0 || c === WAVE_COLS - 1);

            const dot = document.createElement('span');
            dot.className = 'agent-wave-dot';

            // Dynamic White to Orange Gradient
            // Left (White): rgb(255, 255, 255)
            // Right (Orange): rgb(255, 85, 0)
            const ratio = c / (WAVE_COLS - 1); // 0 at left, 1 at right
            const r_val = 255;
            const g_val = Math.round(255 - (170 * ratio)); // 255 to 85
            const b_val = Math.round(255 - (255 * ratio)); // 255 to 0
            dot.style.backgroundColor = `rgb(${r_val}, ${g_val}, ${b_val})`;

            if (isCorner) {
                dot.style.visibility = 'hidden';
            }
            waveGrid.appendChild(dot);
            dots.push(dot);
        }

        // Start Wave Animation
        const start = performance.now();
        function tick(now) {
            const time = (now - start) / 1000; // Use seconds for easier math

            for (let i = 0; i < dots.length; i++) {
                const c = i % WAVE_COLS;
                const r = Math.floor(i / WAVE_COLS);
                const isCorner = (r === 0 || r === WAVE_ROWS - 1) && (c === 0 || c === WAVE_COLS - 1);

                if (!isCorner) {
                    // "Quantum Audio Stream" Animation (Right to Left)
                    // Using time * positive_speed + c * positive_freq forces the wave to travel LEFT.

                    // Wave 1: Fast, tight ripples carrying the high frequencies
                    const w1 = Math.sin(c * 0.6 + time * 6.0 + r * 0.5);

                    // Wave 2: Slower, wider swells that modulate the fast ripples (creates organic "beats")
                    const w2 = Math.sin(c * 0.3 + time * 3.0 - r * 1.2);

                    // Wave 3: A pulsing energy that shifts vertically across the rows
                    const w3 = Math.cos(c * 0.8 + time * 4.5 + r * 2.0);

                    // Additive and Amplitude synthesis (literally how real audio works)
                    const combined = (w1 * 0.5) + (w2 * w1 * 0.5) + (w3 * 0.3);

                    // Map the complex signal to opacity (0.05 to 1.0)
                    const normalized = (combined + 1.3) / 2.6; // Maps roughly -1.3..1.3 to 0..1
                    const opacity = 0.05 + (normalized * 0.95);

                    dots[i].style.opacity = Math.max(0.05, Math.min(1.0, opacity));
                }
            }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        // Keyboard interactions
        window.addEventListener('keydown', (e) => {
            // If already expanded
            if (isExpanded) {
                if (e.key === 'Tab') {
                    e.preventDefault(); // Prevent tab from moving focus off page
                    // Shrink back to recording
                    isExpanded = false;
                    card.classList.remove('is-expanded');
                    input.value = '';
                    input.blur();
                } else if (e.key === 'Escape') {
                    console.log("Close agent entirely");
                } else if (e.key === 'Enter') {
                    console.log("Submit:", input.value);
                }
                return;
            }

            // If not expanded, and user types a printable character (ignore tab/esc/modifiers here)
            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                isExpanded = true;
                card.classList.add('is-expanded');

                setTimeout(() => {
                    input.focus();
                }, 50);
            } else if (e.key === 'Escape') {
                console.log("Cancelled recording");
            }
        });

        // Click to expand manually
        card.addEventListener('click', () => {
            if (!isExpanded) {
                isExpanded = true;
                card.classList.add('is-expanded');
                setTimeout(() => {
                    input.focus();
                }, 50);
            }
        });

        // Handle Send button click
        sendBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            console.log("Submit:", input.value);
        });


    </script>
</body>

</html>
